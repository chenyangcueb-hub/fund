name: 货币基金日报

on:
  schedule:
    - cron: '03 6 * * *'
  workflow_dispatch:

jobs:
  run-fund-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install --upgrade pip
          pip install akshare requests pandas

      - name: 运行基金数据脚本
        run: python fund_bot.py
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
